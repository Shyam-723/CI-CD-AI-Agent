name: Intentional Error Test

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: A step that intentionally fails
        run: |
          python broken_script.py

  heal:
    needs: [build_and_test]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run CI Healer Action
        uses: ./ # This points to the action.yml in the root of the current repo
        with:
          groq_api_key: ${{ secrets.GROQ_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
